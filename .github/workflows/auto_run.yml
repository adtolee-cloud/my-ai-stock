name: Daily AI Stock Screener Auto Update

on:
  schedule:
    # 每天台灣時間下午 15:30 自動執行
    - cron: '30 7 * * *'
  workflow_dispatch: # 允許手動強制執行

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 檢查並複製儲存庫程式碼
      uses: actions/checkout@v4

    - name: 2. 初始化 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安裝量化分析所需套件 (額外安裝 requests 與 lxml 防止阻擋)
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas numpy requests lxml

    - name: 4. 執行選股演算法並產生最新網頁
      env:
        # 強制將執行環境的 JavaScript 動作引擎設定為新版，徹底拔除警告訊息
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      run: |
        python taiwan_ai_screener.py

    - name: 5. 將最新產出的網頁自動推回 GitHub 儲存庫
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add index.html
        if ! git diff-index --quiet HEAD --; then
          git commit -m "🤖 系統自動更新：$(date '+%Y-%m-%d %H:%M:%S') 最新 AI 飆股數據"
          git push
        else
          echo "今日數據與先前一致，無需更新。"
        fi
